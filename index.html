<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<title>Sistema Oficina V3</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
font-family:Arial;
background:linear-gradient(135deg,#667eea,#764ba2);
}

.card{
border-radius:16px;
}

.dark-mode{
background:#121212!important;
color:white!important;
}

.dark-mode .card{
background:#1e1e1e;
color:white;
}

</style>

</head>

<body>

<!-- LOGIN -->

<div id="telaLogin" class="container mt-5" style="max-width:400px">

<div class="card shadow">

<div class="card-header bg-dark text-white">
Login do Sistema
</div>

<div class="card-body">

<input id="usuarioLogin" class="form-control mb-2" placeholder="Usuário">
<input type="password" id="senhaLogin" class="form-control mb-3" placeholder="Senha">

<button class="btn btn-success w-100 mb-2" onclick="login()">Entrar</button>
<button class="btn btn-secondary w-100" onclick="mostrarCadastro()">Criar Conta</button>

</div>

</div>

</div>

<!-- CADASTRO -->

<div id="telaCadastro" class="container mt-5" style="max-width:400px; display:none">

<div class="card shadow">

<div class="card-header bg-primary text-white">
Criar Usuário
</div>

<div class="card-body">

<input id="novoUsuario" class="form-control mb-2" placeholder="Usuário">
<input type="password" id="novaSenha" class="form-control mb-3" placeholder="Senha">

<button class="btn btn-success w-100 mb-2" onclick="criarUsuario()">Cadastrar</button>
<button class="btn btn-secondary w-100" onclick="voltarLogin()">Voltar</button>

</div>

</div>

</div>

<!-- SISTEMA -->

<div id="sistema" style="display:none">

<div class="container mt-5">

<div class="card shadow-lg">

<div class="card-header bg-primary text-white d-flex justify-content-between">

<span>🔧 Sistema Oficina</span>

<div>

<button class="btn btn-light btn-sm" onclick="mostrarClientes()">Clientes</button>
<button class="btn btn-light btn-sm" onclick="mostrarPecas()">Peças</button>
<button class="btn btn-light btn-sm" onclick="mostrarOS()">Ordem Serviço</button>
<button class="btn btn-light btn-sm" onclick="mostrarRelatorio()">Relatório</button>

<button class="btn btn-dark btn-sm" onclick="toggleDarkMode()">🌙</button>
<button class="btn btn-danger btn-sm" onclick="logout()">Sair</button>

</div>

</div>

<div class="card-body">

<!-- CLIENTES -->

<div id="telaClientes">

<h4>Clientes</h4>

<input id="nomeCliente" class="form-control mb-2" placeholder="Nome">
<input id="emailCliente" class="form-control mb-2" placeholder="Email">
<input id="telefoneCliente" class="form-control mb-2" placeholder="Telefone">

<button class="btn btn-success mb-3" onclick="adicionarCliente()">Adicionar</button>

<table class="table">

<thead class="table-dark">

<tr>
<th>ID</th>
<th>Nome</th>
<th>Email</th>
<th>Telefone</th>
<th>Ações</th>
</tr>

</thead>

<tbody id="tabelaClientes"></tbody>

</table>

</div>

<!-- PEÇAS -->

<div id="telaPecas" style="display:none">

<h4>Peças / Estoque</h4>

<input id="nomePeca" class="form-control mb-2" placeholder="Peça">
<input id="marcaPeca" class="form-control mb-2" placeholder="Marca">
<input id="modeloPeca" class="form-control mb-2" placeholder="Modelo">
<input id="estoquePeca" class="form-control mb-2" placeholder="Quantidade">
<input id="precoPeca" class="form-control mb-2" placeholder="Preço">

<button class="btn btn-success mb-3" onclick="adicionarPeca()">Adicionar</button>

<table class="table">

<thead class="table-dark">

<tr>
<th>ID</th>
<th>Peça</th>
<th>Marca</th>
<th>Modelo</th>
<th>Estoque</th>
<th>Preço</th>
<th>Ações</th>
</tr>

</thead>

<tbody id="tabelaPecas"></tbody>

</table>

</div>

<!-- ORDEM DE SERVIÇO -->

<div id="telaOS" style="display:none">

<h4>Ordem de Serviço</h4>

<select id="clienteOS" class="form-control mb-2"></select>

<input id="descricaoOS" class="form-control mb-2" placeholder="Descrição do serviço">

<input id="valorOS" class="form-control mb-2" placeholder="Valor do serviço">

<button class="btn btn-success mb-3" onclick="criarOS()">Criar Ordem</button>

<table class="table">

<thead class="table-dark">

<tr>
<th>ID</th>
<th>Cliente</th>
<th>Serviço</th>
<th>Valor</th>
<th>Data</th>
</tr>

</thead>

<tbody id="tabelaOS"></tbody>

</table>

</div>

<!-- RELATÓRIO -->

<div id="telaRelatorio" style="display:none">

<h4>Relatório Financeiro</h4>

<p>Total Clientes: <span id="rClientes"></span></p>
<p>Total Peças: <span id="rPecas"></span></p>
<p>Total Serviços: <span id="rServicos"></span></p>
<p>Faturamento Total: R$ <span id="rValor"></span></p>

</div>

</div>
</div>
</div>

</div>

<script>

let usuarios = JSON.parse(localStorage.getItem("usuarios")) || []
let clientes = JSON.parse(localStorage.getItem("clientes")) || []
let pecas = JSON.parse(localStorage.getItem("pecas")) || []
let ordens = JSON.parse(localStorage.getItem("ordens")) || []

function salvar(){
localStorage.setItem("clientes",JSON.stringify(clientes))
localStorage.setItem("pecas",JSON.stringify(pecas))
localStorage.setItem("ordens",JSON.stringify(ordens))
}

function login(){

let usuario=usuarioLogin.value
let senha=senhaLogin.value

let valido=usuarios.find(u=>u.usuario===usuario && u.senha===senha)

if(valido){
telaLogin.style.display="none"
sistema.style.display="block"
mostrarClientes()
}else{
alert("Login inválido")
}

}

function logout(){
location.reload()
}

function criarUsuario(){

usuarios.push({usuario:novoUsuario.value,senha:novaSenha.value})

localStorage.setItem("usuarios",JSON.stringify(usuarios))

alert("Usuário criado")

voltarLogin()

}

function mostrarCadastro(){
telaLogin.style.display="none"
telaCadastro.style.display="block"
}

function voltarLogin(){
telaCadastro.style.display="none"
telaLogin.style.display="block"
}

function toggleDarkMode(){
document.body.classList.toggle("dark-mode")
}

function esconderTelas(){
telaClientes.style.display="none"
telaPecas.style.display="none"
telaOS.style.display="none"
telaRelatorio.style.display="none"
}

function mostrarClientes(){
esconderTelas()
telaClientes.style.display="block"
atualizarClientes()
}

function mostrarPecas(){
esconderTelas()
telaPecas.style.display="block"
atualizarPecas()
}

function mostrarOS(){
esconderTelas()
telaOS.style.display="block"

clienteOS.innerHTML=""

clientes.forEach(c=>{
clienteOS.innerHTML+=`<option>${c.nome}</option>`
})

atualizarOS()
}

function mostrarRelatorio(){
esconderTelas()
telaRelatorio.style.display="block"

rClientes.innerText=clientes.length
rPecas.innerText=pecas.length
rServicos.innerText=ordens.length

let total=0
ordens.forEach(o=>total+=Number(o.valor))

rValor.innerText=total

}

function adicionarCliente(){

let id=Date.now()

clientes.push({
id,
nome:nomeCliente.value,
email:emailCliente.value,
telefone:telefoneCliente.value
})

salvar()
atualizarClientes()

}

function atualizarClientes(){

tabelaClientes.innerHTML=""

clientes.forEach((c,index)=>{

tabelaClientes.innerHTML+=`
<tr>
<td>${c.id}</td>
<td>${c.nome}</td>
<td>${c.email}</td>
<td>${c.telefone}</td>

<td>

<button class="btn btn-warning btn-sm" onclick="editarCliente(${index})">Editar</button>

<button class="btn btn-danger btn-sm" onclick="excluirCliente(${index})">Excluir</button>

</td>

</tr>
`

})

}

function editarCliente(index){

let c = clientes[index]

nomeCliente.value=c.nome
emailCliente.value=c.email
telefoneCliente.value=c.telefone

clientes.splice(index,1)

salvar()
atualizarClientes()

}

function excluirCliente(index){

if(confirm("Deseja excluir este cliente?")){

clientes.splice(index,1)

salvar()
atualizarClientes()

}

}

function adicionarPeca(){

let id=Date.now()

pecas.push({
id,
nome:nomePeca.value,
marca:marcaPeca.value,
modelo:modeloPeca.value,
estoque:estoquePeca.value,
preco:precoPeca.value
})

salvar()
atualizarPecas()

}

function atualizarPecas(){

tabelaPecas.innerHTML=""

pecas.forEach((p,index)=>{

tabelaPecas.innerHTML+=`
<tr>
<td>${p.id}</td>
<td>${p.nome}</td>
<td>${p.marca}</td>
<td>${p.modelo}</td>
<td>${p.estoque}</td>
<td>${p.preco}</td>

<td>

<button class="btn btn-warning btn-sm" onclick="editarPeca(${index})">Editar</button>

<button class="btn btn-danger btn-sm" onclick="excluirPeca(${index})">Excluir</button>

</td>

</tr>
`

})

}

function editarPeca(index){

let p = pecas[index]

nomePeca.value=p.nome
marcaPeca.value=p.marca
modeloPeca.value=p.modelo
estoquePeca.value=p.estoque
precoPeca.value=p.preco

pecas.splice(index,1)

salvar()
atualizarPecas()

}

function excluirPeca(index){

if(confirm("Deseja excluir esta peça?")){

pecas.splice(index,1)

salvar()
atualizarPecas()

}

}

function criarOS(){

let id=Date.now()

ordens.push({
id,
cliente:clienteOS.value,
servico:descricaoOS.value,
valor:valorOS.value,
data:new Date().toLocaleDateString()
})

salvar()
atualizarOS()

}

function atualizarOS(){

tabelaOS.innerHTML=""

ordens.forEach(o=>{

tabelaOS.innerHTML+=`
<tr>
<td>${o.id}</td>
<td>${o.cliente}</td>
<td>${o.servico}</td>
<td>${o.valor}</td>
<td>${o.data}</td>
</tr>
`

})

}

</script>

</body>
</html>
