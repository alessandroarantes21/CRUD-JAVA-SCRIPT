<!DOCTYPE html>
<html lang="pt-br">

<head>
<meta charset="UTF-8">
<title>Sistema Oficina</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
font-family:Arial;
background:linear-gradient(135deg,#667eea,#764ba2);
}

.card{
border-radius:15px;
}

.dark-mode{
background:#121212!important;
color:white!important;
}

.dark-mode .card{
background:#1e1e1e;
color:white;
}

</style>
</head>

<body>


<!-- LOGIN -->

<div id="telaLogin" class="container mt-5" style="max-width:400px">

<div class="card shadow">

<div class="card-header bg-dark text-white">
Login do Sistema
</div>

<div class="card-body">

<input id="usuarioLogin" class="form-control mb-2" placeholder="Usuário">

<input type="password" id="senhaLogin" class="form-control mb-3" placeholder="Senha">

<button class="btn btn-success w-100 mb-2" onclick="login()">Entrar</button>

<button class="btn btn-secondary w-100" onclick="mostrarCadastro()">Criar Conta</button>

</div>

</div>

</div>
