```html
<!DOCTYPE html>
<html lang="pt-br">

<head>
<meta charset="UTF-8">
<title>Sistema Oficina V3</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
font-family:Arial;
background:linear-gradient(135deg,#667eea,#764ba2);
}

.card{
border-radius:15px;
}

</style>

</head>

<body>

<div class="container mt-5">

<div class="card shadow-lg">

<div class="card-header bg-primary text-white">

<h4>🔧 Sistema Oficina</h4>

<button class="btn btn-light btn-sm" onclick="mostrarClientes()">Clientes</button>
<button class="btn btn-light btn-sm" onclick="mostrarPecas()">Peças</button>

</div>

<div class="card-body">

<!-- CLIENTES -->

<div id="clientes">

<h5>Clientes</h5>

<div class="row mb-3">

<div class="col">
<input id="nomeCliente" class="form-control" placeholder="Nome">
</div>

<div class="col">
<input id="emailCliente" class="form-control" placeholder="Email">
</div>

<div class="col">
<input id="telefoneCliente" class="form-control" placeholder="Telefone">
</div>

<div class="col">
<button class="btn btn-success" onclick="adicionarCliente()">Adicionar</button>
</div>

</div>

<table class="table">

<thead>
<tr>
<th>ID</th>
<th>Nome</th>
<th>Email</th>
<th>Telefone</th>
<th>Ações</th>
</tr>
</thead>

<tbody id="tabelaClientes"></tbody>

</table>

</div>


<!-- PEÇAS -->

<div id="pecas" style="display:none">

<h5>Peças</h5>

<div class="row mb-3">

<div class="col">
<input id="nomePeca" class="form-control" placeholder="Peça">
</div>

<div class="col">
<input id="marcaPeca" class="form-control" placeholder="Marca">
</div>

<div class="col">
<input id="estoquePeca" class="form-control" placeholder="Estoque">
</div>

<div class="col">
<button class="btn btn-success" onclick="adicionarPeca()">Adicionar</button>
</div>

</div>

<table class="table">

<thead>
<tr>
<th>ID</th>
<th>Peça</th>
<th>Marca</th>
<th>Estoque</th>
<th>Ações</th>
</tr>
</thead>

<tbody id="tabelaPecas"></tbody>

</table>

</div>

</div>
</div>
</div>


<script>

let clientes = JSON.parse(localStorage.getItem("clientes")) || [];
let pecas = JSON.parse(localStorage.getItem("pecas")) || [];

function salvar(){
localStorage.setItem("clientes",JSON.stringify(clientes));
localStorage.setItem("pecas",JSON.stringify(pecas));
}

function mostrarClientes(){
document.getElementById("clientes").style.display="block";
document.getElementById("pecas").style.display="none";
}

function mostrarPecas(){
document.getElementById("clientes").style.display="none";
document.getElementById("pecas").style.display="block";
}

function adicionarCliente(){

let nome = document.getElementById("nomeCliente").value;
let email = document.getElementById("emailCliente").value;
let telefone = document.getElementById("telefoneCliente").value;

if(nome === "" || email === ""){
alert("Preencha nome e email");
return;
}

let id = clientes.length + 1;

clientes.push({
id:id,
nome:nome,
email:email,
telefone:telefone
});

salvar();

document.getElementById("nomeCliente").value="";
document.getElementById("emailCliente").value="";
document.getElementById("telefoneCliente").value="";

mostrarClientesTabela();

}

function mostrarClientesTabela(){

let tabela = document.getElementById("tabelaClientes");
tabela.innerHTML="";

clientes.forEach(c => {

tabela.innerHTML += `
<tr>
<td>${c.id}</td>
<td>${c.nome}</td>
<td>${c.email}</td>
<td>${c.telefone || ""}</td>
<td><button onclick="excluirCliente(${c.id})" class="btn btn-danger btn-sm">Excluir</button></td>
</tr>
`;

});

}

function excluirCliente(id){

clientes = clientes.filter(c => c.id !== id);

salvar();

mostrarClientesTabela();

}

function adicionarPeca(){

let nome = document.getElementById("nomePeca").value;
let marca = document.getElementById("marcaPeca").value;
let estoque = document.getElementById("estoquePeca").value;

if(nome === ""){
alert("Digite o nome da peça");
return;
}

let id = pecas.length + 1;

pecas.push({
id:id,
nome:nome,
marca:marca,
estoque:estoque
});

salvar();

document.getElementById("nomePeca").value="";
document.getElementById("marcaPeca").value="";
document.getElementById("estoquePeca").value="";

mostrarPecasTabela();

}

function mostrarPecasTabela(){

let tabela = document.getElementById("tabelaPecas");
tabela.innerHTML="";

pecas.forEach(p => {

tabela.innerHTML += `
<tr>
<td>${p.id}</td>
<td>${p.nome}</td>
<td>${p.marca}</td>
<td>${p.estoque}</td>
<td><button onclick="excluirPeca(${p.id})" class="btn btn-danger btn-sm">Excluir</button></td>
</tr>
`;

});

}

function excluirPeca(id){

pecas = pecas.filter(p => p.id !== id);

salvar();

mostrarPecasTabela();

}

mostrarClientesTabela();
mostrarPecasTabela();

</script>

</body>
</html>
```
